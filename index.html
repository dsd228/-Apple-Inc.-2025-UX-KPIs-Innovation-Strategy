<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta name="description" content="Panel de Estadísticas 2025 - Dashboard optimizado con métricas de usuarios, ventas y ROI">
  
  <!-- Cache Control -->
  <meta http-equiv="cache-control" content="public, max-age=31536000">
  <meta name="robots" content="index, follow">
  
  <title>Dashboard Animado - Panel de Estadísticas 2025</title>
  
  <!-- Preload critical resources -->
  <link rel="preload" href="./assets/critical.css" as="style">
  <link rel="preload" href="./style-optimized.css" as="style">
  <link rel="preload" href="./assets/optimized/usuarios.webp" as="image">
  
  <!-- PWA Manifest -->
  <link rel="manifest" href="./manifest.json">
  <meta name="theme-color" content="#007aff">
  
  <!-- Critical CSS inline -->
  <style>
    /* Critical CSS - Inline Bootstrap Grid & Utilities */
    *,*::before,*::after{box-sizing:border-box}
    .container{width:100%;padding-right:var(--bs-gutter-x,.75rem);padding-left:var(--bs-gutter-x,.75rem);margin-right:auto;margin-left:auto}
    @media (min-width:576px){.container{max-width:540px}}
    @media (min-width:768px){.container{max-width:720px}}
    @media (min-width:992px){.container{max-width:960px}}
    @media (min-width:1200px){.container{max-width:1140px}}
    @media (min-width:1400px){.container{max-width:1320px}}
    .row{--bs-gutter-x:1.5rem;--bs-gutter-y:0;display:flex;flex-wrap:wrap;margin-top:calc(-1 * var(--bs-gutter-y));margin-right:calc(-.5 * var(--bs-gutter-x));margin-left:calc(-.5 * var(--bs-gutter-x))}
    .row>*{flex-shrink:0;width:100%;max-width:100%;padding-right:calc(var(--bs-gutter-x) * .5);padding-left:calc(var(--bs-gutter-x) * .5);margin-top:var(--bs-gutter-y)}
    .col{flex:1 0 0%}
    .g-4,.gy-4{--bs-gutter-y:1.5rem}
    .g-4,.gx-4{--bs-gutter-x:1.5rem}
    @media (min-width:768px){.col-md-4{flex:0 0 auto;width:33.33333333%}}
    .img-fluid{max-width:100%;height:auto}
    .rounded{border-radius:var(--bs-border-radius,.375rem)!important}
    .text-center{text-align:center!important}
    .mb-5{margin-bottom:3rem!important}
    
    /* Critical above-the-fold styles */
    body{background:linear-gradient(135deg,#1f1c2c,#928dab);font-family:'Segoe UI',sans-serif;color:white;padding:40px 0;margin:0}
    h1{font-size:2rem;margin:0 0 3rem 0;font-weight:600}
    .glass{backdrop-filter:blur(10px);background:rgba(255,255,255,0.1);border-radius:15px;border:1px solid rgba(255,255,255,0.2);box-shadow:0 4px 30px rgba(0,0,0,0.1);padding:20px;color:white;transition:transform 0.3s ease;opacity:0;animation:fadeInUp 1s ease-out forwards}
    @keyframes fadeInUp{from{opacity:0;transform:translateY(40px)}to{opacity:1;transform:translateY(0)}}
    .delay-1{animation-delay:0.2s}
    .delay-2{animation-delay:0.5s}
    .delay-3{animation-delay:0.8s}
  </style>
  
  <!-- Load non-critical CSS asynchronously -->
  <link rel="stylesheet" href="./style-optimized.css" media="print" onload="this.media='all'">
  <noscript><link rel="stylesheet" href="./style-optimized.css"></noscript>
</head>
<body>
  <!-- Skip link for accessibility -->
  <a href="#main-content" class="skip-link">Saltar al contenido principal</a>
  
  <div class="container">
    <h1 class="text-center mb-5">Panel de Estadísticas 2025</h1>
    
    <main id="main-content">
      <div class="row g-4">
        <div class="col-md-4">
          <div class="glass delay-1">
            <h4>Usuarios Nuevos</h4>
            <picture>
              <source srcset="./assets/optimized/usuarios.webp" type="image/webp">
              <img src="./assets/optimized/usuarios.webp" 
                   class="img-fluid rounded" 
                   alt="Gráfico de usuarios nuevos registrados en el sistema"
                   loading="lazy"
                   width="300" 
                   height="150">
            </picture>
          </div>
        </div>
        
        <div class="col-md-4">
          <div class="glass delay-2">
            <h4>Ventas Totales</h4>
            <picture>
              <source srcset="./assets/optimized/ventas.webp" type="image/webp">
              <img src="./assets/optimized/ventas.webp" 
                   class="img-fluid rounded" 
                   alt="Gráfico de ventas totales del período"
                   loading="lazy"
                   width="300" 
                   height="150">
            </picture>
          </div>
        </div>
        
        <div class="col-md-4">
          <div class="glass delay-3">
            <h4>Retorno de Inversión</h4>
            <picture>
              <source srcset="./assets/optimized/roi.webp" type="image/webp">
              <img src="./assets/optimized/roi.webp" 
                   class="img-fluid rounded" 
                   alt="Gráfico de retorno de inversión (ROI)"
                   loading="lazy"
                   width="300" 
                   height="150">
            </picture>
          </div>
        </div>
      </div>
    </main>
  </div>

  <!-- Inline critical JavaScript for performance -->
  <script>
    // Service Worker registration for caching
    if ('serviceWorker' in navigator) {
      window.addEventListener('load', function() {
        navigator.serviceWorker.register('./sw.js')
          .then(function(registration) {
            console.log('ServiceWorker registered successfully');
          })
          .catch(function(error) {
            console.log('ServiceWorker registration failed');
          });
      });
    }
    
    // Add keyboard navigation support
    document.addEventListener('keydown', function(e) {
      if (e.key === 'Tab') {
        document.body.classList.add('using-keyboard');
      }
    });
    
    document.addEventListener('mousedown', function() {
      document.body.classList.remove('using-keyboard');
    });
    
    // Lazy loading fallback for older browsers
    if ('loading' in HTMLImageElement.prototype) {
      // Native lazy loading supported
    } else {
      // Fallback for browsers without native lazy loading
      const images = document.querySelectorAll('img[loading="lazy"]');
      const imageObserver = new IntersectionObserver((entries, observer) => {
        entries.forEach(entry => {
          if (entry.isIntersecting) {
            const img = entry.target;
            img.src = img.dataset.src || img.src;
            observer.unobserve(img);
          }
        });
      });
      images.forEach(img => imageObserver.observe(img));
    }
  </script>
</body>
</html>
