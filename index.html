<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Dashboard Animado</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet" />
  <style>
    body {
      background: linear-gradient(-45deg, #1f1c2c, #928dab, #667db6, #0082c8);
      background-size: 400% 400%;
      animation: gradientShift 15s ease infinite;
      font-family: 'Segoe UI', sans-serif;
      color: white;
      padding: 40px 0;
    }

    @keyframes gradientShift {
      0% { background-position: 0% 50%; }
      50% { background-position: 100% 50%; }
      100% { background-position: 0% 50%; }
    }

    .glass {
      backdrop-filter: blur(10px);
      background: rgba(255, 255, 255, 0.1);
      border-radius: 15px;
      border: 1px solid rgba(255, 255, 255, 0.2);
      box-shadow: 0 4px 30px rgba(0, 0, 0, 0.1);
      padding: 20px;
      color: white;
      transition: transform 0.3s ease;
      opacity: 0;
      animation: fadeInUp 1s ease-out forwards;
    }

    .glass:hover {
      transform: translateY(-5px);
    }

    @keyframes fadeInUp {
      from {
        opacity: 0;
        transform: translateY(40px);
      }
      to {
        opacity: 1;
        transform: translateY(0);
      }
    }

    .delay-1 {
      animation-delay: 0.2s;
    }

    .delay-2 {
      animation-delay: 0.5s;
    }

    .delay-3 {
      animation-delay: 0.8s;
    }

    .chart-container {
      position: relative;
      height: 200px;
      margin: 15px 0;
      background: rgba(255, 255, 255, 0.05);
      border-radius: 10px;
      padding: 20px;
      display: flex;
      align-items: center;
      justify-content: center;
      overflow: hidden;
    }

    /* Pie Chart Styles */
    .pie-chart {
      width: 120px;
      height: 120px;
      border-radius: 50%;
      background: conic-gradient(
        #34c759 0deg 126deg,
        #007aff 126deg 216deg,
        #ffcc00 216deg 288deg,
        rgba(255, 255, 255, 0.1) 288deg 360deg
      );
      position: relative;
      animation: pieRotate 2s ease-in-out;
    }

    .pie-chart::after {
      content: "1000\AUsuarios";
      white-space: pre;
      position: absolute;
      top: 50%;
      left: 50%;
      transform: translate(-50%, -50%);
      background: rgba(255, 255, 255, 0.1);
      width: 60px;
      height: 60px;
      border-radius: 50%;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 10px;
      font-weight: bold;
      text-align: center;
      line-height: 1.2;
    }

    /* Bar Chart Styles */
    .bar-chart {
      display: flex;
      align-items: end;
      height: 100px;
      width: 100%;
      gap: 10px;
      justify-content: center;
    }

    .bar {
      background: linear-gradient(180deg, #007aff, #34c759);
      border-radius: 4px 4px 0 0;
      min-width: 20px;
      animation: barGrow 1.5s ease-out forwards;
      transform-origin: bottom;
      position: relative;
    }

    .bar:nth-child(1) { height: 65%; animation-delay: 0.1s; }
    .bar:nth-child(2) { height: 78%; animation-delay: 0.2s; }
    .bar:nth-child(3) { height: 90%; animation-delay: 0.3s; }
    .bar:nth-child(4) { height: 85%; animation-delay: 0.4s; }
    .bar:nth-child(5) { height: 92%; animation-delay: 0.5s; }
    .bar:nth-child(6) { height: 88%; animation-delay: 0.6s; }

    .bar::after {
      content: attr(data-value);
      position: absolute;
      top: -20px;
      left: 50%;
      transform: translateX(-50%);
      font-size: 10px;
      font-weight: bold;
    }

    /* Line Chart Styles */
    .line-chart {
      position: relative;
      width: 100%;
      height: 100px;
    }

    .line-chart svg {
      width: 100%;
      height: 100%;
    }

    .line-path {
      fill: none;
      stroke: #34c759;
      stroke-width: 3;
      stroke-dasharray: 200;
      stroke-dashoffset: 200;
      animation: lineDraw 2s ease-in-out forwards;
    }

    .line-area {
      fill: rgba(52, 199, 89, 0.1);
      opacity: 0;
      animation: areaFade 2s ease-in-out 1s forwards;
    }

    .chart-canvas {
      border-radius: 10px;
      background: rgba(255, 255, 255, 0.05);
    }

    .card-icon {
      width: 32px;
      height: 32px;
      margin-bottom: 10px;
      transition: transform 0.3s ease;
      filter: drop-shadow(0 2px 4px rgba(0, 0, 0, 0.3));
    }

    .card-icon:hover {
      transform: scale(1.1) rotate(5deg);
    }

    .glass h4 {
      display: flex;
      align-items: center;
      gap: 10px;
      margin-bottom: 15px;
      font-weight: 600;
      text-shadow: 0 2px 4px rgba(0, 0, 0, 0.3);
    }

    /* Chart Labels */
    .chart-labels {
      display: flex;
      justify-content: space-around;
      margin-top: 10px;
      font-size: 11px;
      opacity: 0.8;
    }

    .legend {
      display: flex;
      justify-content: center;
      gap: 15px;
      margin-top: 10px;
      font-size: 11px;
    }

    .legend-item {
      display: flex;
      align-items: center;
      gap: 5px;
    }

    .legend-color {
      width: 12px;
      height: 12px;
      border-radius: 50%;
    }

    /* Animations */
    @keyframes pieRotate {
      from { transform: rotate(-90deg); }
      to { transform: rotate(0deg); }
    }

    @keyframes barGrow {
      from { transform: scaleY(0); }
      to { transform: scaleY(1); }
    }

    @keyframes lineDraw {
      to { stroke-dashoffset: 0; }
    }

    @keyframes areaFade {
      to { opacity: 1; }
    }

    @media (max-width: 768px) {
      .chart-container {
        height: 150px;
        padding: 15px;
      }
      
      .pie-chart {
        width: 100px;
        height: 100px;
      }
      
      .bar-chart {
        height: 80px;
      }
    }
  </style>
</head>
<body>
  <div class="container">
    <h1 class="text-center mb-5">Panel de Estadísticas 2025</h1>
    <div class="row g-4">
      <div class="col-md-4">
        <div class="glass delay-1">
          <h4>
            <svg class="card-icon" viewBox="0 0 24 24" fill="currentColor">
              <path d="M12 2C13.1 2 14 2.9 14 4C14 5.1 13.1 6 12 6C10.9 6 10 5.1 10 4C10 2.9 10.9 2 12 2ZM21 9V7L15 6.5V4.5C15 2.5 13.5 1 11.5 1S8 2.5 8 4.5V6.5L2 7V9L8 8.5V15L6 16.5V19L8.5 17.5L12 19L15.5 17.5L18 19V16.5L16 15V8.5L21 9Z"/>
            </svg>
            Usuarios Nuevos
          </h4>
          <div class="chart-container">
            <div class="pie-chart"></div>
          </div>
          <div class="legend">
            <div class="legend-item">
              <div class="legend-color" style="background: #34c759;"></div>
              <span>Nuevos (35%)</span>
            </div>
            <div class="legend-item">
              <div class="legend-color" style="background: #007aff;"></div>
              <span>Recurrentes (45%)</span>
            </div>
            <div class="legend-item">
              <div class="legend-color" style="background: #ffcc00;"></div>
              <span>Reactivados (20%)</span>
            </div>
          </div>
        </div>
      </div>
      <div class="col-md-4">
        <div class="glass delay-2">
          <h4>
            <svg class="card-icon" viewBox="0 0 24 24" fill="currentColor">
              <path d="M7 18V16H17V18H7ZM12.5 12V7.5L16 11L12.5 14.5V10H7.5V12H12.5ZM12 2C17.52 2 22 6.48 22 12S17.52 22 12 22S2 17.52 2 12S6.48 2 12 2ZM12 20C16.42 20 20 16.42 20 12S16.42 4 12 4S4 7.58 4 12S7.58 20 12 20Z"/>
            </svg>
            Ventas Totales
          </h4>
          <div class="chart-container">
            <div class="bar-chart">
              <div class="bar" data-value="65k"></div>
              <div class="bar" data-value="78k"></div>
              <div class="bar" data-value="90k"></div>
              <div class="bar" data-value="85k"></div>
              <div class="bar" data-value="92k"></div>
              <div class="bar" data-value="88k"></div>
            </div>
          </div>
          <div class="chart-labels">
            <span>Ene</span>
            <span>Feb</span>
            <span>Mar</span>
            <span>Abr</span>
            <span>May</span>
            <span>Jun</span>
          </div>
        </div>
      </div>
      <div class="col-md-4">
        <div class="glass delay-3">
          <h4>
            <svg class="card-icon" viewBox="0 0 24 24" fill="currentColor">
              <path d="M11.8 10.9C10.9 10.9 10.1 11.7 10.1 12.6S10.9 14.3 11.8 14.3S13.5 13.5 13.5 12.6S12.7 10.9 11.8 10.9ZM7.3 8.1L8.7 6.7L6.6 4.6L5.2 6L7.3 8.1ZM6 13H3V11H6V13ZM12 3H10V6H12V3ZM17.7 8.1L19.8 6L18.4 4.6L16.3 6.7L17.7 8.1ZM21 13V11H18V13H21ZM12 8C14.2 8 16 9.8 16 12S14.2 16 12 16S8 14.2 8 12S9.8 8 12 8ZM12 18C12.6 18 13 17.6 13 17S12.6 16 12 16S11 16.4 11 17S11.4 18 12 18ZM12 21H10V18H12V21Z"/>
            </svg>
            Retorno de Inversión
          </h4>
          <div class="chart-container">
            <div class="line-chart">
              <svg viewBox="0 0 200 100">
                <defs>
                  <linearGradient id="areaGradient" x1="0%" y1="0%" x2="0%" y2="100%">
                    <stop offset="0%" style="stop-color:#34c759;stop-opacity:0.3" />
                    <stop offset="100%" style="stop-color:#34c759;stop-opacity:0" />
                  </linearGradient>
                </defs>
                <path class="line-area" d="M 20 70 L 60 55 L 100 40 L 140 30 L 180 20 L 180 80 L 20 80 Z" fill="url(#areaGradient)"/>
                <path class="line-path" d="M 20 70 L 60 55 L 100 40 L 140 30 L 180 20"/>
                <circle cx="20" cy="70" r="3" fill="#34c759"/>
                <circle cx="60" cy="55" r="3" fill="#34c759"/>
                <circle cx="100" cy="40" r="3" fill="#34c759"/>
                <circle cx="140" cy="30" r="3" fill="#34c759"/>
                <circle cx="180" cy="20" r="3" fill="#34c759"/>
              </svg>
            </div>
          </div>
          <div class="chart-labels">
            <span>Q1: 15%</span>
            <span>Q2: 22%</span>
            <span>Q3: 28%</span>
            <span>Q4: 35%</span>
          </div>
        </div>
      </div>
    </div>
  </div>
</body>
</html>
</html>
